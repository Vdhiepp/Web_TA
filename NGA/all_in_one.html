<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All-in-One Tool</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
    }

    textarea {
        width: 100%;
        height: 180px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
    }

    .btn-parse { background: #007bff; color: white; }
    .btn-com { background: #dc3545; color: white; }
    .btn-cmt { background: #28a745; color: white; }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 8px;
    }

    th {
        background: #333;
        color: white;
    }

    .highlight {
        background: #ffeeba;
    }

    .output {
        margin-top: 20px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        white-space: pre-line;
    }
</style>
</head>
<body>

<h2>🔥 All-in-One Booking Tool</h2>

<textarea id="inputText" placeholder="Paste dữ liệu..."></textarea>
<br>

<button class="btn-parse" onclick="parseData()">1. Parse</button>
<button class="btn-com" onclick="applyCOM()">2. Tính COM</button>
<button class="btn-cmt" onclick="exportCMT()">3. Xuất CMT</button>

<table>
<thead>
<tr>
    <th>Date</th>
    <th>Rate Code</th>
    <th>Room Type</th>
    <th>Occupancy</th>
    <th>Room Revenue</th>
    <th>Packages</th>
    <th>Total</th>
    <th>Extra</th>
    <th>Total Amount</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="output" id="output"></div>

<script>
let records = [];

// ================= PARSE =================
function parseData() {
    const input = document.getElementById("inputText").value;

    const lines = input.split(/\r?\n/)
        .map(l => l.trim())
        .filter(l => l !== "");

    const RECORD_SIZE = 9;
    records = [];

    for (let i = 0; i < lines.length; i += 9) {
        const chunk = lines.slice(i, i + 9);
        if (chunk.length < 9) continue;

        records.push({
            date: chunk[0],
            rateCode: chunk[1],
            roomType: chunk[2],
            occupancy: chunk[3],
            roomRevenue: chunk[4],
            packages: chunk[5],
            total: chunk[6],
            extra: chunk[7],
            totalAmount: chunk[8],
            highlight: false
        });
    }

    renderTable();
}

// ================= RENDER =================
function renderTable() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    records.forEach(r => {
        tbody.innerHTML += `
        <tr class="${r.highlight ? 'highlight' : ''}">
            <td>${r.date}</td>
            <td>${r.rateCode}</td>
            <td>${r.roomType}</td>
            <td>${r.occupancy}</td>
            <td>${r.roomRevenue}</td>
            <td>${r.packages}</td>
            <td>${r.total}</td>
            <td>${r.extra}</td>
            <td>${r.totalAmount}</td>
        </tr>`;
    });
}

// ================= TÍNH COM =================
function applyCOM() {
    const n = records.length;
    let adjust = 0;

    if (n >= 20) adjust = 4;
    else if (n >= 17) adjust = 3;
    else if (n >= 10) adjust = 2;
    else if (n >= 7) adjust = 1;

    const getVal = v => parseInt(v.replace(/[^\d]/g, "")) || 0;

    const sorted = [...records].sort((a, b) =>
        getVal(a.totalAmount) - getVal(b.totalAmount)
    );

    const selected = sorted.slice(0, adjust);

    records = records.map(r => {
        if (selected.includes(r)) {
            return {
                ...r,
                rateCode: "ICBB",
                packages: "- " + r.packages,
                total: "--",
                totalAmount: "--",
                highlight: true
            };
        }
        return r;
    });

    renderTable();
}

// ================= XUẤT CMT =================
function exportCMT() {
    function formatDate(d) {
        const p = d.split(" ")[1].split("-");
        return p[0] + "/" + p[1];
    }

    const foc = records.filter(r => r.totalAmount === "--");
    const rm = records.filter(r => r.totalAmount !== "--");

    const unique = [...new Set(rm.map(r => r.totalAmount))];

    let result = "";

    if (unique.length === 1) {
        const price = unique[0];
        const focCount = foc.length.toString().padStart(2, "0");

        result += `RM (${price} r/n) + BB + ${focCount} night FOC to TA after C/o\n`;
    } else {
        result += `RM + BB to TA after C/o\n`;

        foc.forEach(d => {
            result += `đêm ${formatDate(d.date)}: 01 night FOC\n`;
        });

        let groups = [];

        rm.forEach(r => {
            const date = formatDate(r.date);

            if (!groups.length) {
                groups.push({ start: date, end: date, price: r.totalAmount });
            } else {
                let last = groups[groups.length - 1];

                if (last.price === r.totalAmount) {
                    last.end = date;
                } else {
                    groups.push({ start: date, end: date, price: r.totalAmount });
                }
            }
        });

        groups.forEach(g => {
            if (g.start === g.end) {
                result += `đêm ${g.start}: RM (${g.price} r/n)\n`;
            } else {
                result += `đêm ${g.start}-${g.end}: RM (${g.price} r/n)\n`;
            }
        });
    }

    result += `Xtra to POA
Giảm 20% giá công bố cho tất cả các dịch vụ onsite bao gồm FB và minibar (không bao gồm rượu mạnh), SPA, Laundry (không bao gồm giặt khô và giặt nhanh) & room services.
`;

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
