<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parse Multi-line Booking</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
    }

    textarea {
        width: 100%;
        height: 180px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        background: #28a745;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
    }

    th {
        background: #007bff;
        color: white;
    }
</style>
</head>
<body>

<h2>Parse Multi-line Booking → Table</h2>

<textarea id="inputText" placeholder="Paste data..."></textarea>
<br>
<button onclick="parseData()">Parse</button>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Rate Code</th>
            <th>Room Type</th>
            <th>Occupancy</th>
            <th>Room Revenue</th>
            <th>Packages</th>
            <th>Total</th>
            <th>Extra Packages</th>
            <th>Total Amount</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
function parseData() {
    const input = document.getElementById("inputText").value;

    // Tách từng dòng + loại bỏ dòng rỗng
    const lines = input
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(l => l !== "");

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const RECORD_SIZE = 9; // mỗi record có 9 dòng

    for (let i = 0; i < lines.length; i += RECORD_SIZE) {
        const chunk = lines.slice(i, i + RECORD_SIZE);

        if (chunk.length < RECORD_SIZE) continue;

        const [
            date,
            rateCode,
            roomType,
            occupancy,
            roomRevenue,
            packages,
            total,
            extraPackages,
            totalAmount
        ] = chunk;

        const row = `
            <tr>
                <td>${date}</td>
                <td>${rateCode}</td>
                <td>${roomType}</td>
                <td>${occupancy}</td>
                <td>${roomRevenue}</td>
                <td>${packages}</td>
                <td>${total}</td>
                <td>${extraPackages}</td>
                <td>${totalAmount}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    }
}
</script>

</body>
</html>
