<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Main Dashboard</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background: #2c3e50;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    .menu-item {
        padding: 12px;
        margin-bottom: 10px;
        background: #34495e;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .menu-item:hover {
        background: #1abc9c;
    }

    /* Content */
    .content {
        flex: 1;
        background: #ecf0f1;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Menu</h2>

    <div class="menu-item" onclick="loadPage('tach_du_lieu.html')">
        📄 Tách dữ liệu
    </div>

    <div class="menu-item" onclick="loadPage('tinh_dem_com.html')">
        🧮 Tính đêm COM
    </div>
</div>

<!-- Content -->
<div class="content">
    <iframe id="frame" src="tach_du_lieu.html"></iframe>
</div>

<script>
function loadPage(page) {
    document.getElementById("frame").src = page;
}
</script>

</body>
</html>
